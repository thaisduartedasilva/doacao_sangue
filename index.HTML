<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sistema de Captação de Dados para Doação de Sangue</title>
</head>

<body>

    <header id="cabecalho">
        <img class="gif" src="assets/gif2.gif" alt="gif2">
        <h1>Sistema de Captação de Dados para Doação de Sangue</h1>
        <img class="gif" src="assets/gif2.gif" alt="gif2">
    </header>
    <br>

    <div id="perguntas">
        <form id="formulario">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Informe o seu nome">

            <br><br>

            <label for="sobrenome">Sobrenome:</label>
            <input type="text" id="sobrenome" placeholder="Informe o seu sobrenome">

            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Informe o seu email">

            <br><br>

            <label for="idade">Idade:</label>
            <input type="number" id="idade">

            <br><br>

            <label for="peso">Peso:</label>
            <input type="number" id="peso" placeholder="Informe o seu peso">

            <br><br>

            <label for="tipoSanguineo">Tipo sanguíneo:</label>
            <select name="tipoSanguineo" id="tipoSanguineo">
                <option value="">Selecione</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>

            <br><br>

            <label for="telefone">Telefone:</label>
            <input type="tel" name="telefone" id="telefone" placeholder="Informe o seu telefone">

            <br><br>

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Informe a sua cidade">

            <br><br>

            <label for="estado">Estado:</label>
            <input type="text" id="estado" placeholder="Informe o seu estado">

            <br><br>

            <div class="bloco">
            <img class="gif" src="assets/undefined - Imgur.gif" alt="gif">
            <button id="button" type="submit">Enviar</button>
            <img class="gif" src="assets/undefined - Imgur.gif" alt="gif">
            </div>

        </form>
    </div>

    <div id="resultado"></div>

    <script src="javaScript.js"></script>

</body>

</html>
